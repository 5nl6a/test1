    desc:"서두르지 않고 느긋하게, 다툼보다는 평화를 좋아하는 아이예요. 안기고 기대는 걸 좋아하고, 큰 욕심 없이 지금 이 순간을 편안하게 즐기는 편이에요.",
    care:"느리다고 다그치지 마세요. 충분한 스킨십과 여유로운 일정이 이 아이에게는 최고의 안정제예요.",
    products:[["포근한 애착 담요","https://link.coupang.com/a/EXAMPLE15"],["느긋한 그림 그리기 세트","https://link.coupang.com/a/EXAMPLE16"]]
  }
};

// 동물별 간단 SVG (이모지 대신 일관된 라인 스타일)
const EMBLEMS = {
  squirrel:`<circle cx="50" cy="55" r="28" fill="{soft}"/><ellipse cx="72" cy="40" rx="14" ry="20" fill="{soft}" transform="rotate(35 72 40)"/><circle cx="50" cy="55" r="4" fill="{color}"/><circle cx="38" cy="48" r="3" fill="#2B2A33"/><circle cx="58" cy="48" r="3" fill="#2B2A33"/>`,
  turtle:`<ellipse cx="50" cy="58" rx="30" ry="22" fill="{soft}"/><circle cx="50" cy="58" r="14" fill="{color}" opacity="0.3"/><circle cx="28" cy="50" r="9" fill="{soft}"/><circle cx="24" cy="48" r="2.5" fill="#2B2A33"/>`,
  puppy:`<circle cx="50" cy="55" r="26" fill="{soft}"/><ellipse cx="30" cy="38" rx="9" ry="14" fill="{color}" transform="rotate(-20 30 38)"/><ellipse cx="70" cy="38" rx="9" ry="14" fill="{color}" transform="rotate(20 70 38)"/><circle cx="42" cy="52" r="3" fill="#2B2A33"/><circle cx="58" cy="52" r="3" fill="#2B2A33"/>`,
  cat:`<circle cx="50" cy="56" r="26" fill="{soft}"/><polygon points="30,38 38,52 22,52" fill="{color}"/><polygon points="70,38 78,52 62,52" fill="{color}"/><circle cx="42" cy="56" r="3" fill="#2B2A33"/><circle cx="58" cy="56" r="3" fill="#2B2A33"/>`,
  owl:`<ellipse cx="50" cy="56" rx="24" ry="26" fill="{soft}"/><circle cx="40" cy="50" r="9" fill="#fff"/><circle cx="60" cy="50" r="9" fill="#fff"/><circle cx="40" cy="50" r="4" fill="{color}"/><circle cx="60" cy="50" r="4" fill="{color}"/><polygon points="50,58 45,66 55,66" fill="{color}"/>`,
  rabbit:`<circle cx="50" cy="58" r="24" fill="{soft}"/><ellipse cx="38" cy="28" rx="6" ry="18" fill="{soft}"/><ellipse cx="62" cy="28" rx="6" ry="18" fill="{soft}"/><circle cx="42" cy="56" r="3" fill="#2B2A33"/><circle cx="58" cy="56" r="3" fill="#2B2A33"/>`,
  lion:`<circle cx="50" cy="56" r="20" fill="{color}" opacity="0.25"/><circle cx="50" cy="56" r="26" fill="none" stroke="{color}" stroke-width="8"/><circle cx="50" cy="56" r="18" fill="{soft}"/><circle cx="43" cy="54" r="3" fill="#2B2A33"/><circle cx="57" cy="54" r="3" fill="#2B2A33"/>`,
  koala:`<circle cx="50" cy="58" r="24" fill="{soft}"/><circle cx="26" cy="40" r="11" fill="{soft}"/><circle cx="74" cy="40" r="11" fill="{soft}"/><circle cx="42" cy="58" r="3" fill="#2B2A33"/><circle cx="58" cy="58" r="3" fill="#2B2A33"/>`
};

function emblemSVG(typeId){
  const t = TYPES[typeId];
  return EMBLEMS[typeId].replaceAll("{soft}", t.soft).replaceAll("{color}", t.color);
}

/* ===================== 질문 ===================== */
// 각 옵션은 하나의 유형에 가중치를 줍니다.
const QUESTIONS = [
  {q:"놀이터에 도착했을 때 우리 아이는?", a:[["바로 뛰어가 이것저것 만져본다","squirrel"],["잠시 서서 분위기를 살핀다","turtle"],["다른 아이를 찾아 인사한다","puppy"],["혼자 구석에서 좋아하는 놀이를 시작한다","cat"]]},
  {q:"낯선 어른이 인사를 건네면?", a:[["호기심 어린 눈으로 다가간다","squirrel"],["엄마 뒤로 살짝 숨는다","turtle"],["수줍게 웃으며 인사한다","rabbit"],["멀리서 가만히 관찰만 한다","owl"]]},
  {q:"새 장난감을 받았을 때 가장 먼저 하는 행동은?", a:[["뜯어서 바로 작동시켜본다","squirrel"],["설명서(그림)부터 살펴본다","owl"],["가족에게 자랑하러 간다","puppy"],["조용히 혼자 갖고 논다","cat"]]},
  {q:"친구와 장난감을 두고 다툼이 생기면?", a:[["내 것이라고 강하게 주장한다","lion"],["속상해서 눈물을 보인다","rabbit"],["양보하고 다른 놀이로 넘어간다","koala"],["어른에게 상황을 설명하러 온다","owl"]]},
  {q:"여행 가서 새로운 숙소에 도착했을 때?", a:[["신나서 방 구석구석 탐험한다","squirrel"],["익숙해질 때까지 가만히 있는다","turtle"],["엄마 품에 안겨 있고 싶어한다","koala"],["짐 정리를 같이 돕고 싶어한다","lion"]]},
  {q:"그림책을 읽어줄 때 우리 아이의 반응은?", a:[["슬픈 장면에서 눈물을 글썽인다","rabbit"],["다음 내용을 미리 궁금해한다","squirrel"],["등장인물의 행동에 의견을 낸다","lion"],["조용히 그림만 오래 들여다본다","owl"]]},
  {q:"놀이공원처럼 시끄럽고 복잡한 곳에서는?", a:[["신이 나서 어디부터 갈지 정한다","lion"],["소음에 예민하게 반응한다","rabbit"],["손을 꼭 잡고 천천히 둘러본다","turtle"],["사람 구경하는 것만으로도 즐겁다","owl"]]},
  {q:"형제나 친구가 울고 있을 때 우리 아이는?", a:[["다가가서 같이 토닥여준다","puppy"],["왜 우는지 거리를 두고 살핀다","owl"],["같이 속상한 표정을 짓는다","rabbit"],["분위기를 풀려고 장난을 건다","koala"]]},
  {q:"하루 일정이 갑자기 바뀌면?", a:[["금방 잊고 다른 놀이로 전환한다","squirrel"],["크게 실망하며 표현한다","rabbit"],["별로 신경 쓰지 않는다","koala"],["이유를 꼬치꼬치 물어본다","lion"]]},
  {q:"어린이집/유치원에서 노는 모습은?", a:[["여러 친구들 사이를 옮겨다니며 논다","squirrel"],["친한 친구 한두 명과 깊게 논다","cat"],["놀이를 주도하고 규칙을 정한다","lion"],["조용히 앉아 만들기·그리기를 한다","owl"]]},
  {q:"혼자 있는 시간이 주어지면?", a:[["심심해서 금방 누군가를 찾는다","puppy"],["오히려 편안하고 좋아한다","cat"],["인형이나 애착 물건을 끌어안는다","koala"],["상상놀이를 혼자 펼친다","rabbit"]]},
  {q:"칭찬을 받았을 때 우리 아이의 반응은?", a:[["더 잘 보이려고 신나게 보여준다","lion"],["부끄러워하며 살짝 웃는다","turtle"],["같이 칭찬받은 사람과 나누고 싶어한다","puppy"],["별 반응 없이 덤덤하게 받는다","koala"]]}
];

/* ===================== 상태 & 로직 ===================== */
let current = 0;
const scores = {};
Object.keys(TYPES).forEach(k=>scores[k]=0);
let answerHistory = [];

const screens = {
  start: document.getElementById('screen-start'),
  quiz: document.getElementById('screen-quiz'),
  result: document.getElementById('screen-result')
};
function showScreen(name){
  Object.values(screens).forEach(s=>s.classList.remove('active'));
  screens[name].classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}

document.getElementById('btn-start').addEventListener('click', ()=>{
  current = 0;
  Object.keys(scores).forEach(k=>scores[k]=0);
  answerHistory = [];
  renderQuestion();
  showScreen('quiz');
});

function renderQuestion(){
  const q = QUESTIONS[current];
  document.getElementById('question-title').textContent = q.q;
  document.getElementById('progress-label').textContent = `질문 ${current+1} / ${QUESTIONS.length}`;
  document.getElementById('progress-fill').style.width = `${(current/QUESTIONS.length)*100}%`;

  const backBtn = document.getElementById('btn-back');
  backBtn.classList.toggle('show', current > 0);

  const wrap = document.getElementById('answers-wrap');
  wrap.innerHTML = '';
  q.a.forEach(([label, typeId])=>{
    const btn = document.createElement('button');
    btn.className = 'answer-card';
    btn.textContent = label;
    btn.addEventListener('click', ()=>{
      scores[typeId] += 1;
      answerHistory[current] = typeId;
      current += 1;
      if(current < QUESTIONS.length){
        renderQuestion();
      } else {
        showResult();
      }
    });
    wrap.appendChild(btn);
  });
}

function goBack(){
  if(current <= 0) return;
  current -= 1;
  const prevType = answerHistory[current];
  if(prevType){
    scores[prevType] -= 1;
    answerHistory[current] = undefined;
  }
  renderQuestion();
}

document.getElementById('btn-back').addEventListener('click', goBack);

function topType(){
  let best = null, bestScore = -1;
  Object.entries(scores).forEach(([k,v])=>{
    if(v > bestScore){ bestScore = v; best = k; }
  });
  return best;
}

function showResult(){
  document.getElementById('progress-fill').style.width = '100%';
  const typeId = topType();
  const t = TYPES[typeId];

  document.getElementById('result-emblem').innerHTML = emblemSVG(typeId);
  document.getElementById('result-name').textContent = t.name;
  document.getElementById('result-desc').textContent = t.desc;
  document.getElementById('result-care').textContent = t.care;

  const tagsWrap = document.getElementById('result-tags');
  tagsWrap.innerHTML = '';
  t.tags.forEach(tag=>{
    const span = document.createElement('span');
    span.textContent = tag;
    tagsWrap.appendChild(span);
  });

  const productsWrap = document.getElementById('result-products');
  if(productsWrap){
    productsWrap.innerHTML = '';
    t.products.forEach(([label, url])=>{
      const a = document.createElement('a');
      a.className = 'product-link';
      a.href = url;
      a.target = '_blank';
      a.rel = 'noopener sponsored';
      a.innerHTML = `<span>${label}</span><span class="arrow">→</span>`;
      productsWrap.appendChild(a);
    });
  }

  showScreen('result');
}

document.getElementById('btn-restart').addEventListener('click', ()=>{
  showScreen('start');
});

document.getElementById('btn-copy').addEventListener('click', ()=>{
  navigator.clipboard.writeText(window.location.href).then(()=>{
    const btn = document.getElementById('btn-copy');
    const original = btn.textContent;
    btn.textContent = '링크 복사 완료!';
    setTimeout(()=>{ btn.textContent = original; }, 1800);
  });
});
</script>
